<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NeoVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --nv-primary: #0A2540;
            --nv-blue: #0052CC;
            --nv-blue-light: #0073E6;
            --nv-green: #00875A;
            --nv-red: #DE350B;
            --nv-orange: #FF8B00;
            
            --nv-bg: #F7F9FC;
            --nv-surface: #FFFFFF;
            --nv-border: #DFE1E6;
            
            --nv-text-primary: #172B4D;
            --nv-text-secondary: #5E6C84;
            --nv-text-muted: #8993A4;
            
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 3px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--nv-bg);
            color: var(--nv-text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Header */
        .main-header {
            background: var(--nv-surface);
            border-bottom: 1px solid var(--nv-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo {
            width: 36px;
            height: 36px;
            background: var(--nv-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: white;
            letter-spacing: -0.5px;
        }
        
        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--nv-primary);
            letter-spacing: -0.4px;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .security-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: #E6FCFF;
            border: 1px solid #B3F5FF;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #006C9C;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .security-badge:hover {
            background: #CCF4FE;
        }
        
        .shield-icon {
            width: 16px;
            height: 16px;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--nv-text-primary);
        }
        
        .user-role {
            font-size: 12px;
            color: var(--nv-text-secondary);
        }
        
        /* Main Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px;
        }
        
        /* Page Header */
        .page-header {
            margin-bottom: 32px;
        }
        
        .greeting {
            font-size: 28px;
            font-weight: 700;
            color: var(--nv-text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.6px;
        }
        
        .date-info {
            font-size: 14px;
            color: var(--nv-text-secondary);
        }
        
        /* Accounts Section */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--nv-text-primary);
            margin-bottom: 20px;
            letter-spacing: -0.2px;
        }
        
        .accounts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .account-card {
            background: var(--nv-surface);
            border: 1px solid var(--nv-border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .account-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .account-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: #F4F5F7;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            color: var(--nv-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .account-menu {
            color: var(--nv-text-muted);
            font-size: 20px;
            cursor: pointer;
        }
        
        .balance-section {
            margin-bottom: 24px;
        }
        
        .balance-label {
            font-size: 13px;
            color: var(--nv-text-secondary);
            margin-bottom: 4px;
        }
        
        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            color: var(--nv-text-primary);
            letter-spacing: -1px;
        }
        
        .account-number {
            font-size: 13px;
            color: var(--nv-text-muted);
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
        }
        
        .account-footer {
            display: flex;
            gap: 12px;
        }
        
        .account-action {
            flex: 1;
            padding: 10px;
            background: #F4F5F7;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--nv-text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .account-action:hover {
            background: #EBECF0;
        }
        
        .account-action.primary {
            background: var(--nv-blue);
            color: white;
        }
        
        .account-action.primary:hover {
            background: var(--nv-blue-light);
        }
        
        /* Quick Actions */
        .quick-actions {
            background: var(--nv-surface);
            border: 1px solid var(--nv-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 40px;
        }
        
        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .quick-action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px;
            background: #F7F9FC;
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-action-item:hover {
            background: white;
            border-color: var(--nv-blue);
            box-shadow: var(--shadow-sm);
        }
        
        .action-icon {
            font-size: 28px;
        }
        
        .action-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--nv-text-primary);
            text-align: center;
        }
        
        /* Transactions */
        .transactions-card {
            background: var(--nv-surface);
            border: 1px solid var(--nv-border);
            border-radius: 12px;
            padding: 24px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .view-all-link {
            font-size: 13px;
            font-weight: 500;
            color: var(--nv-blue);
            text-decoration: none;
            cursor: pointer;
        }
        
        .view-all-link:hover {
            text-decoration: underline;
        }
        
        .transaction-list {
            display: flex;
            flex-direction: column;
        }
        
        .transaction-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #F4F5F7;
        }
        
        .transaction-item:last-child {
            border-bottom: none;
        }
        
        .transaction-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 20px;
        }
        
        .transaction-icon-wrapper.send {
            background: #FFF0F0;
        }
        
        .transaction-icon-wrapper.receive {
            background: #E3FCEF;
        }
        
        .transaction-info {
            flex: 1;
        }
        
        .transaction-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--nv-text-primary);
            margin-bottom: 2px;
        }
        
        .transaction-meta {
            font-size: 12px;
            color: var(--nv-text-secondary);
        }
        
        .transaction-amount {
            font-size: 15px;
            font-weight: 600;
        }
        
        .transaction-amount.negative {
            color: var(--nv-red);
        }
        
        .transaction-amount.positive {
            color: var(--nv-green);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        .empty-text {
            font-size: 14px;
            color: var(--nv-text-secondary);
        }
        
        /* Button Styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--nv-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--nv-blue-light);
        }
        
        .btn-secondary {
            background: #F4F5F7;
            color: var(--nv-text-primary);
        }
        
        .btn-secondary:hover {
            background: #EBECF0;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }
        
        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #F4F5F7 25%, #EBECF0 50%, #F4F5F7 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-card {
            height: 180px;
            margin-bottom: 20px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                padding: 0 20px;
            }
            
            .container {
                padding: 20px;
            }
            
            .greeting {
                font-size: 24px;
            }
            
            .accounts-container {
                grid-template-columns: 1fr;
            }
            
            .quick-actions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .user-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo">NV</div>
                <div class="brand-name">NeoVault</div>
            </div>
            
            <div class="header-actions">
                <a href="/security-dashboard" class="security-badge">
                    <svg class="shield-icon" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    Protected
                </a>
                
                <div class="user-menu">
                    <div class="user-info">
                        <div class="user-name" id="user-display-name">Loading...</div>
                        <div class="user-role">Personal Account</div>
                    </div>
                    <div class="user-avatar" id="user-avatar">?</div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="greeting" id="greeting">Good Morning</h1>
            <div class="date-info" id="current-date">Loading...</div>
        </div>
        
        <!-- Accounts Section -->
        <div>
            <h2 class="section-title">Your Accounts</h2>
            <div class="accounts-container" id="accounts-container">
                <!-- Loading Skeleton -->
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="quick-actions">
            <h2 class="section-title">Quick Actions</h2>
            <div class="quick-actions-grid">
                <div class="quick-action-item" onclick="alert('Transfer feature coming soon!')">
                    <div class="action-icon">💸</div>
                    <div class="action-label">Transfer</div>
                </div>
                <div class="quick-action-item" onclick="alert('Pay Bills feature coming soon!')">
                    <div class="action-icon">📄</div>
                    <div class="action-label">Pay Bills</div>
                </div>
                <div class="quick-action-item" onclick="alert('Deposit feature coming soon!')">
                    <div class="action-icon">📥</div>
                    <div class="action-label">Deposit</div>
                </div>
                <div class="quick-action-item" onclick="alert('Cards feature coming soon!')">
                    <div class="action-icon">💳</div>
                    <div class="action-label">Cards</div>
                </div>
                <div class="quick-action-item" onclick="alert('Analytics feature coming soon!')">
                    <div class="action-icon">📊</div>
                    <div class="action-label">Analytics</div>
                </div>
                <div class="quick-action-item" onclick="window.location.href='/security-dashboard'">
                    <div class="action-icon">🔒</div>
                    <div class="action-label">Security</div>
                </div>
            </div>
        </div>
        
        <!-- Recent Transactions -->
        <div class="transactions-card">
            <div class="card-header">
                <h2 class="section-title" style="margin: 0;">Recent Transactions</h2>
                <a href="#" class="view-all-link">View All</a>
            </div>
            <div class="transaction-list" id="transactions-list">
                <!-- Loading -->
                <div class="skeleton" style="height: 60px; margin-bottom: 12px;"></div>
                <div class="skeleton" style="height: 60px; margin-bottom: 12px;"></div>
                <div class="skeleton" style="height: 60px;"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Initialize
        let currentUser = null;
        
        async function initDashboard() {
            // Check auth
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login';
                return;
            }
            
            // Load user
            currentUser = JSON.parse(localStorage.getItem('user') || '{}');
            updateUserDisplay();
            updateGreeting();
            
            // Load data
            await Promise.all([
                loadAccounts(),
                loadTransactions()
            ]);
        }
        
        function updateUserDisplay() {
            const name = currentUser.username || 'User';
            document.getElementById('user-display-name').textContent = name;
            document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
        }
        
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting = 'Good Morning';
            if (hour >= 12 && hour < 18) greeting = 'Good Afternoon';
            else if (hour >= 18) greeting = 'Good Evening';
            
            document.getElementById('greeting').textContent = `${greeting}, ${currentUser.username}!`;
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);
        }
        
        async function loadAccounts() {
            try {
                const response = await fetch('/api/banking/accounts', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    renderAccounts(data.accounts);
                }
            } catch (error) {
                console.error('Error loading accounts:', error);
            }
        }
        
        function renderAccounts(accounts) {
            const container = document.getElementById('accounts-container');
            
            if (!accounts || accounts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">🏦</div>
                        <div class="empty-text">No accounts yet</div>
                        <button class="btn btn-primary" style="margin-top: 16px;">Create Account</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = accounts.map(account => `
                <div class="account-card">
                    <div class="account-header">
                        <span class="account-type-badge">
                            ${account.account_type === 'checking' ? '💳' : '💰'} ${account.account_type}
                        </span>
                        <div class="account-menu">⋯</div>
                    </div>
                    <div class="balance-section">
                        <div class="balance-label">Available Balance</div>
                        <div class="balance-amount">$${parseFloat(account.balance).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                    <div class="account-number">${account.account_number}</div>
                    <div class="account-footer">
                        <button class="account-action primary">Transfer</button>
                        <button class="account-action">Details</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadTransactions() {
            try {
                const response = await fetch('/api/banking/transactions?limit=5', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    renderTransactions(data.transactions);
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }
        
        function renderTransactions(transactions) {
            const list = document.getElementById('transactions-list');
            
            if (!transactions || transactions.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">No transactions yet</div>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = transactions.map(trans => {
                const isDebit = trans.transaction_type === 'transfer' || trans.transaction_type === 'bill_payment';
                const icon = isDebit ? '📤' : '📥';
                const iconClass = isDebit ? 'send' : 'receive';
                const amountClass = isDebit ? 'negative' : 'positive';
                const amount = isDebit ? `-$${trans.amount}` : `+$${trans.amount}`;
                
                return `
                    <div class="transaction-item">
                        <div class="transaction-icon-wrapper ${iconClass}">
                            ${icon}
                        </div>
                        <div class="transaction-info">
                            <div class="transaction-title">${trans.description || formatTransactionType(trans.transaction_type)}</div>
                            <div class="transaction-meta">${formatDate(trans.timestamp)} • ${trans.reference_number}</div>
                        </div>
                        <div class="transaction-amount ${amountClass}">${amount}</div>
                    </div>
                `;
            }).join('');
        }
        
        function formatTransactionType(type) {
            return type.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
    <script src="/js/banking-security-monitor.js"></script>
</body>
</html>
