<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard - NeoVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
        }
        
        /* Header matching banking dashboard */
        .main-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 16px;
        }
        
        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        /* Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px;
        }
        
        /* Status Card */
        .security-status-card {
            background: var(--bg-card);
            border: 2px solid;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            text-align: center;
        }
        
        .security-status-card.secure {
            border-color: var(--color-success);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, var(--bg-card) 100%);
        }
        
        .security-status-card.warning {
            border-color: var(--color-warning);
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.05) 0%, var(--bg-card) 100%);
        }
        
        .security-status-card.danger {
            border-color: var(--color-danger);
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.05) 0%, var(--bg-card) 100%);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .status-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .status-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .status-description {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 24px;
        }
        
        .threat-score-display {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .score-label {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .score-value {
            font-size: 32px;
            font-weight: 700;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        /* Activity List */
        .activity-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        
        .activity-item:hover {
            background: var(--bg-card-hover);
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-item.suspicious {
            background: rgba(239, 68, 68, 0.05);
            border-left: 3px solid var(--color-danger);
        }
        
        .activity-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        
        .activity-icon-wrapper.login { background: rgba(0, 212, 255, 0.1); }
        .activity-icon-wrapper.transfer { background: rgba(16, 185, 129, 0.1); }
        .activity-icon-wrapper.view { background: rgba(124, 58, 237, 0.1); }
        .activity-icon-wrapper.attack { background: rgba(239, 68, 68, 0.1); }
        
        .activity-info {
            flex: 1;
        }
        
        .activity-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .activity-meta {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        /* Sessions List */
        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .session-item:last-child {
            border-bottom: none;
        }
        
        .session-item.current {
            background: rgba(0, 212, 255, 0.05);
            border-left: 3px solid var(--color-primary);
        }
        
        .session-item.attacker {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--color-danger);
            animation: pulse 2s infinite;
        }
        
        .session-info {
            flex: 1;
        }
        
        .session-device {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .session-details {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .session-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        /* Loading */
        .loading-skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-card-hover) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
            border-radius: 8px;
            height: 60px;
            margin-bottom: 12px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo">🛡️</div>
                <div class="brand-name">Security Dashboard</div>
            </div>
            
            <div class="header-actions">
                <button class="btn btn-secondary btn-sm" onclick="window.location.href='/dashboard'">
                    ← Back to Banking
                </button>
                <button class="btn btn-secondary btn-sm" onclick="handleLogout()">
                    Logout
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <div class="container">
        <!-- Security Status Card -->
        <div class="security-status-card" id="status-card">
            <div class="status-icon" id="status-icon">🛡️</div>
            <h1 class="status-title" id="status-title">Loading...</h1>
            <p class="status-description" id="status-description">Analyzing your account security...</p>
            
            <div class="threat-score-display">
                <span class="score-label">Threat Level:</span>
                <span class="score-value" id="threat-score">--%</span>
            </div>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card primary">
                <div class="stat-value" id="active-sessions-count">-</div>
                <div class="stat-label">Active Sessions</div>
            </div>
            
            <div class="stat-card success">
                <div class="stat-value" id="total-actions-count">-</div>
                <div class="stat-label">Total Actions</div>
            </div>
            
            <div class="stat-card primary">
                <div class="stat-value" id="session-duration">-</div>
                <div class="stat-label">Session Duration</div>
            </div>
        </div>
        
        <!-- Recent Activity -->
        <div class="activity-card">
            <h2 class="card-title">Recent Activity</h2>
            <div id="activity-list">
                <div class="loading-skeleton"></div>
                <div class="loading-skeleton"></div>
                <div class="loading-skeleton"></div>
            </div>
        </div>
        
        <!-- Active Sessions -->
        <div class="activity-card">
            <div class="card-header">
                <h2 class="card-title" style="margin: 0;">Your Active Sessions</h2>
            </div>
            <div id="sessions-list">
                <div class="loading-skeleton"></div>
                <div class="loading-skeleton"></div>
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
    <script>
        let refreshInterval;
        let lastAnomalyScore = 0;
        
        async function initSecurityDashboard() {
            // Check auth
            if (!TokenShield.requireAuth()) return;
            
            // Load data
            await Promise.all([
                loadSecurityStatus(),
                loadRecentActivity(),
                loadActiveSessions()
            ]);
            
            // Auto-refresh every 1 second for real-time attack detection
            refreshInterval = setInterval(async () => {
                await loadSecurityStatus();
                await loadActiveSessions();
            }, 1000); // Changed from 3000 to 1000 for real-time updates
        }
        
        async function loadSecurityStatus() {
            const result = await TokenShield.api.getDashboardStats();
            
            if (result.success && result.data.success) {
                const stats = result.data.stats;
                updateSecurityStatus(stats);
                
                // Check if session was revoked
                if (!stats.current_session.is_active) {
                    clearInterval(refreshInterval);
                    showSessionRevokedAlert();
                }
            }
        }
        
        function updateSecurityStatus(stats) {
            const score = stats.current_session.anomaly_score;
            const statusCard = document.getElementById('status-card');
            const statusIcon = document.getElementById('status-icon');
            const statusTitle = document.getElementById('status-title');
            const statusDescription = document.getElementById('status-description');
            const threatScore = document.getElementById('threat-score');
            
            // Update score
            threatScore.textContent = (score * 100).toFixed(1) + '%';
            
            // Update status based on score
            statusCard.classList.remove('secure', 'warning', 'danger');
            
            if (score < 0.3) {
                statusCard.classList.add('secure');
                statusIcon.textContent = '✅';
                statusTitle.textContent = 'Your Account is Secure';
                statusDescription.textContent = 'No suspicious activity detected. Your sessions are being monitored by AI-powered security.';
                threatScore.style.color = 'var(--color-success)';
            } else if (score < 0.5) {
                statusCard.classList.add('warning');
                statusIcon.textContent = '⚠️';
                statusTitle.textContent = 'Monitoring Activity';
                statusDescription.textContent = 'We detected some unusual patterns in your account activity. Additional verification may be required for sensitive operations.';
                threatScore.style.color = 'var(--color-warning)';
            } else if (score < 0.7) {
                statusCard.classList.add('danger');
                statusIcon.textContent = '🚨';
                statusTitle.textContent = 'Security Alert - High Risk';
                statusDescription.textContent = 'CRITICAL: Suspicious activity detected from an unknown location. Protective measures have been activated automatically.';
                threatScore.style.color = 'var(--color-danger)';
            } else {
                statusCard.classList.add('danger');
                statusIcon.textContent = '🔴';
                statusTitle.textContent = 'SECURITY BREACH DETECTED';
                statusDescription.textContent = 'IMMEDIATE ACTION TAKEN: Unauthorized access attempt blocked. All sessions will be terminated for your protection.';
                threatScore.style.color = 'var(--color-critical)';
            }
            
            // Update stats
            document.getElementById('active-sessions-count').textContent = stats.active_sessions;
            document.getElementById('total-actions-count').textContent = stats.total_actions.toLocaleString();
            document.getElementById('session-duration').textContent = stats.session_duration.toFixed(1) + 'm';
            
            // Track score changes
            if (score > lastAnomalyScore && score >= 0.5) {
                // Reload activity to show new suspicious actions
                loadRecentActivity();
            }
            lastAnomalyScore = score;
        }
        
        function showSessionRevokedAlert() {
            const statusCard = document.getElementById('status-card');
            const statusIcon = document.getElementById('status-icon');
            const statusTitle = document.getElementById('status-title');
            const statusDescription = document.getElementById('status-description');
            
            statusCard.classList.remove('secure', 'warning');
            statusCard.classList.add('danger');
            statusIcon.textContent = '🛡️';
            statusTitle.textContent = 'Session Terminated for Security';
            statusDescription.textContent = 'Your session was automatically terminated due to suspicious activity. Please log in again with 2FA verification.';
        }
        
        async function loadRecentActivity() {
            const result = await TokenShield.api.getRecentActivity(15);
            
            if (result.success && result.data.success) {
                renderActivity(result.data.activities);
            }
        }
        
        function renderActivity(activities) {
            const list = document.getElementById('activity-list');
            
            if (!activities || activities.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>No recent activity</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = activities.map(activity => {
                const icon = getActivityIcon(activity.action_type);
                const iconClass = getActivityClass(activity.action_type);
                const isSuspicious = activity.action_type.includes('rapid') || 
                                   activity.action_type.includes('unusual') ||
                                   activity.action_type.includes('failed') ||
                                   activity.action_type.includes('large_transfer') ||
                                   activity.action_type.includes('enumeration');
                
                return `
                    <div class="activity-item ${isSuspicious ? 'suspicious' : ''}">
                        <div class="activity-icon-wrapper ${iconClass}">
                            ${icon}
                        </div>
                        <div class="activity-info">
                            <div class="activity-title">
                                ${formatActionType(activity.action_type)}
                                ${isSuspicious ? ' <span class="badge badge-danger">SUSPICIOUS</span>' : ''}
                            </div>
                            <div class="activity-meta">
                                ${TokenShield.Utils.formatRelativeTime(activity.timestamp)} • ${activity.ip_address || 'Unknown IP'}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function loadActiveSessions() {
            const result = await TokenShield.api.getUserSessions();
            
            if (result.success && result.data.success) {
                renderSessions(result.data.sessions, result.data.current_session_id);
            }
        }
        
        function renderSessions(sessions, currentId) {
            const list = document.getElementById('sessions-list');
            
            if (!sessions || sessions.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔒</div>
                        <p>No active sessions</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = sessions.map(session => {
                const isCurrent = session.id === currentId;
                const isAttacker = session.token && session.token.includes('ATTACKER');
                const device = parseUserAgent(session.user_agent);
                const isHighRisk = session.anomaly_score >= 0.7;
                
                return `
                    <div class="session-item ${isCurrent ? 'current' : ''} ${isAttacker ? 'attacker' : ''}">
                        <div class="session-info">
                            <div class="session-device">
                                ${device} 
                                ${isCurrent ? '<span class="badge badge-primary">Current</span>' : ''}
                                ${isAttacker ? '<span class="badge badge-danger">⚠️ UNAUTHORIZED</span>' : ''}
                                ${isHighRisk && !isCurrent ? '<span class="badge badge-danger">HIGH RISK</span>' : ''}
                            </div>
                            <div class="session-details">
                                ${session.ip_address} • ${TokenShield.Utils.formatDateTime(session.created_at)}
                                ${isAttacker ? ' • <strong style="color: var(--color-danger);">Moscow, Russia (3:47 AM)</strong>' : ''}
                            </div>
                        </div>
                        <div class="session-actions">
                            <span class="badge ${TokenShield.Utils.getSeverityBadge(session.anomaly_score)}">
                                ${(session.anomaly_score * 100).toFixed(1)}%
                            </span>
                            ${!isCurrent ? `
                                <button class="btn btn-danger btn-sm" onclick="revokeSession(${session.id})">
                                    ${isAttacker ? 'BLOCK' : 'Revoke'}
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function revokeSession(sessionId) {
            if (!TokenShield.Utils.confirm('Revoke this session?')) return;
            
            const result = await TokenShield.api.revokeSession(sessionId);
            
            if (result.success && result.data.success) {
                TokenShield.Utils.showToast('Session revoked', 'success');
                loadActiveSessions();
                loadSecurityStatus();
            } else {
                TokenShield.Utils.showToast('Failed to revoke session', 'danger');
            }
        }
        
        async function handleLogout() {
            if (!TokenShield.Utils.confirm('Logout?')) return;
            await TokenShield.api.logout();
            window.location.href = '/';
        }
        
        function getActivityIcon(type) {
            const icons = {
                'login': '🔓',
                'logout': '🔒',
                'page_view': '👁️',
                'money_transfer': '💸',
                'view_accounts': '🏦',
                'view_transactions': '📊',
                'rapid_page_navigation': '⚠️',
                'unusual_access_pattern': '🚨',
                'failed_transaction_attempt': '❌',
                'account_enumeration': '🔍',
                'large_transfer_attempt': '💰'
            };
            return icons[type] || '📝';
        }
        
        function getActivityClass(type) {
            if (type.includes('rapid') || type.includes('unusual') || 
                type.includes('failed') || type.includes('large') || 
                type.includes('enumeration')) {
                return 'attack';
            }
            const classes = {
                'login': 'login',
                'money_transfer': 'transfer',
                'view_accounts': 'view'
            };
            return classes[type] || 'view';
        }
        
        function formatActionType(type) {
            return type.split('_').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }
        
        function parseUserAgent(ua) {
            if (!ua) return 'Unknown Device';
            if (ua.includes('Windows NT 10.0') && ua.includes('Chrome/96')) return '💻 Unknown Windows PC (Chrome 96)';
            if (ua.includes('Chrome')) return '🌐 Chrome Browser';
            if (ua.includes('Firefox')) return '🦊 Firefox Browser';
            if (ua.includes('Safari')) return '🧭 Safari Browser';
            if (ua.includes('Mobile')) return '📱 Mobile Device';
            return '💻 Desktop Browser';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', initSecurityDashboard);
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
   </script>
    <script src="/js/device-fingerprint.js"></script>
</body>
</html>
