user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time ut=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size  1m;

    # Rate-limit zones
    limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=200r/m;
    limit_req_status 429;

    # ── WAF: bad user-agent detection ─────────────────────────────────────
    map $http_user_agent $bad_agent {
        default                0;
        ~*sqlmap               1;
        ~*nikto                1;
        ~*nmap                 1;
        ~*masscan              1;
        ~*zgrab                1;
    }

    # ── WAF: SQLi signatures ──────────────────────────────────────────────
    map $request_uri $sqli_attack {
        default                        0;
        ~*%27                          1;
        ~*(--|%3B)                     1;
        ~*(union.*select)              1;
        ~*(select.*from)               1;
        ~*(insert.*into)               1;
        ~*(drop.*table)                1;
        ~*(exec|execute)               1;
        ~*(xp_cmdshell)                1;
        ~*(benchmark|sleep)            1;
    }

    # ── WAF: XSS signatures ───────────────────────────────────────────────
    map $request_uri $xss_attack {
        default                        0;
        ~*%3Cscript                    1;
        ~*javascript:                  1;
        ~*vbscript:                    1;
        ~*(onload|onerror|onclick)     1;
        ~*document\.cookie             1;
        ~*(eval|alert)                 1;
    }

    # ── WAF: path traversal ───────────────────────────────────────────────
    map $request_uri $traversal_attack {
        default                        0;
        ~*\.\.%2F                      1;
        ~*%2E%2E%2F                    1;
        ~*etc/passwd                   1;
        ~*etc/shadow                   1;
        ~*proc/self                    1;
    }

    # Dynamic IP blocklist — written by TokenShield mitigation engine
    include /etc/nginx/blocked_ips.conf;

    server {
        listen       80;
        server_name  _;

        # Security headers
        add_header X-Frame-Options        "DENY"                            always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header X-TokenShield-WAF      "active"                          always;

        add_header Access-Control-Allow-Origin  "$http_origin"  always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;

        server_tokens off;

        # Block WAF-flagged requests
        if ($bad_agent)        { return 403; }
        if ($sqli_attack)      { return 403; }
        if ($xss_attack)       { return 403; }
        if ($traversal_attack) { return 403; }

        # Handle preflight before rate-limiting
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Health check ──────────────────────────────────────────────────
        location = /health {
            proxy_pass       http://172.20.0.2:5001/health;
            proxy_set_header Host $host;
            access_log       off;
        }

        # ── Auth endpoints ────────────────────────────────────────────────
        location = /api/auth/login {
            limit_req          zone=login_limit burst=5 nodelay;
            proxy_pass         http://172.20.0.2:5001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location = /api/auth/login-2fa {
            limit_req          zone=login_limit burst=5 nodelay;
            proxy_pass         http://172.20.0.2:5001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location = /api/auth/register {
            limit_req          zone=login_limit burst=3 nodelay;
            proxy_pass         http://172.20.0.2:5001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Admin API ─────────────────────────────────────────────────────
        # NO IP restriction — Flask JWT handles authentication.
        # Nginx WAF still blocks SQLi/XSS/traversal above.
        location /api/admin/ {
            limit_req          zone=api_limit burst=20 nodelay;
            proxy_pass         http://172.20.0.2:5001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Banking API ───────────────────────────────────────────────────
        location /api/banking/ {
            limit_req          zone=api_limit burst=20 nodelay;
            proxy_pass         http://172.20.0.2:5001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Security API ──────────────────────────────────────────────────
        location /api/security/ {
            limit_req          zone=api_limit burst=20 nodelay;
            proxy_pass         http://172.20.0.2:5001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Static files ──────────────────────────────────────────────────
        location /static/ {
            proxy_pass         http://172.20.0.2:5001/static/;
            proxy_set_header   Host              $host;
            proxy_cache_valid  200 1d;
            access_log         off;
        }

        # ── Everything else ───────────────────────────────────────────────
        location / {
            limit_req          zone=general_limit burst=50 nodelay;
            proxy_pass         http://172.20.0.2:5001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Custom error pages ────────────────────────────────────────────
        error_page 429 /rate_limited.json;
        location = /rate_limited.json {
            internal;
            default_type application/json;
            return 429 '{"error":"rate_limited","message":"Too many requests.","tokenshield":"waf_active"}';
        }

        error_page 403 /forbidden.json;
        location = /forbidden.json {
            internal;
            default_type application/json;
            return 403 '{"error":"forbidden","message":"Blocked by TokenShield WAF.","tokenshield":"waf_active"}';
        }
    }
}